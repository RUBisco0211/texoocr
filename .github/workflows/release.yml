name: Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: |
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          SDK_VERSION="$(xcrun --sdk macosx --show-sdk-version)"
          echo "macOS SDK: ${SDK_VERSION}"
          test "${SDK_VERSION%%.*}" -ge 26

      - name: Build Release DMG
        env:
          REQUIRED_SDK_MAJOR: "26"
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}" ./scripts/build_dmg.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" build/Dist/*.dmg --clobber
          else
            gh release create "${GITHUB_REF_NAME}" build/Dist/*.dmg \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
